name: CI

on:
  push:
    branches: [main]
    tags: ["api/v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: apps/api

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.ref_type != 'tag'

    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      contracts: ${{ steps.filter.outputs.contracts }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - '.github/workflows/ci.yml'
            web:
              - 'apps/web/**'
              - 'packages/contracts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'
            contracts:
              - 'apps/api/internal/domain/mission/contract.go'
              - 'apps/api/cmd/contracts-gen/**'
              - 'packages/contracts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'

  quality:
    name: Format, Vet, Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: ${{ !cancelled() && (github.ref_type == 'tag' || needs.changes.outputs.api == 'true') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Vet
        run: |
          go vet ./...
          go vet -tags=integration ./...

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: apps/api

      - name: Build
        run: go build ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: ${{ !cancelled() && (github.ref_type == 'tag' || needs.changes.outputs.api == 'true') }}

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: polina
          POSTGRES_PASSWORD: polina
          POSTGRES_DB: polina
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U polina"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://polina:polina@localhost:5432/polina?sslmode=disable
      TEST_DATABASE_URL: postgres://polina:polina@localhost:5432/polina?sslmode=disable
      JWT_SECRET: test-jwt-secret-not-for-production-0123456789

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Unit tests
        run: go test ./... -race -count=1

      - name: Integration tests
        run: go test ./... -tags=integration -race -count=1

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: ${{ !cancelled() && (github.ref_type == 'tag' || needs.changes.outputs.api == 'true') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build production image
        uses: docker/build-push-action@v7
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: false
          tags: polina-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrations:
    name: Migration Up/Down Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: ${{ !cancelled() && (github.ref_type == 'tag' || needs.changes.outputs.api == 'true') }}

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: polina
          POSTGRES_PASSWORD: polina
          POSTGRES_DB: polina
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U polina"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: postgres://polina:polina@localhost:5432/polina?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Install golang-migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.19.1

      - name: Migrate up
        run: migrate -path db/migrations -database "$DB_URL" up

      - name: Migrate down (verify reversibility)
        run: migrate -path db/migrations -database "$DB_URL" down -all

  swagger:
    name: Swagger Docs Drift
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: ${{ !cancelled() && (github.ref_type == 'tag' || needs.changes.outputs.api == 'true') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@v1.16.4

      - name: Regenerate OpenAPI docs
        run: swag init -g cmd/server/main.go -o docs --parseInternal --parseDependency --parseDepth 2

      - name: Check for drift
        run: git diff --exit-code docs/

  contracts:
    name: Contracts Drift & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: ${{ !cancelled() && (github.ref_type == 'tag' || needs.changes.outputs.contracts == 'true') }}

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate contracts (schema + TypeScript)
        run: make -C apps/api generate-contracts

      - name: Check for drift
        run: git diff --exit-code packages/contracts/

      - name: Contract golden tests (TypeScript)
        run: pnpm --dir packages/contracts test

  web:
    name: Web Lint, Tests & E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: changes
    if: ${{ !cancelled() && needs.changes.outputs.web == 'true' }}

    defaults:
      run:
        working-directory: .

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: polina
          POSTGRES_PASSWORD: polina
          POSTGRES_DB: polina
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U polina"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://polina:polina@localhost:5432/polina?sslmode=disable
      JWT_SECRET: web-e2e-jwt-secret-not-for-production-0123456789
      THROTTLE_LIMIT: "120"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --dir apps/web lint

      - name: Typecheck
        run: pnpm --dir apps/web typecheck

      - name: Unit tests
        run: pnpm --dir apps/web test

      - name: Build
        run: pnpm --dir apps/web build

      - name: Install golang-migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.19.1

      - name: Migrate up
        run: migrate -path apps/api/db/migrations -database "$DATABASE_URL" up

      - name: Start API
        run: |
          go build -C apps/api -o /tmp/polina-api ./cmd/server
          nohup /tmp/polina-api > /tmp/polina-api.log 2>&1 &
          timeout 30 sh -c 'until curl -sf http://localhost:8080/health; do sleep 1; done'

      - name: Install Playwright browsers
        run: pnpm --dir apps/web exec playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: pnpm --dir apps/web e2e

      - name: API logs (on failure)
        if: failure()
        run: cat /tmp/polina-api.log
