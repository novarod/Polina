name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: apps/api

jobs:
  quality:
    name: Format, Vet, Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Vet
        run: |
          go vet ./...
          go vet -tags=integration ./...

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: apps/api

      - name: Build
        run: go build ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: polina
          POSTGRES_PASSWORD: polina
          POSTGRES_DB: polina
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U polina"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://polina:polina@localhost:5432/polina?sslmode=disable
      TEST_DATABASE_URL: postgres://polina:polina@localhost:5432/polina?sslmode=disable
      JWT_SECRET: test-jwt-secret-not-for-production-0123456789

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Unit tests
        run: go test ./... -race -count=1

      - name: Integration tests
        run: go test ./... -tags=integration -race -count=1

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: false
          tags: polina-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrations:
    name: Migration Up/Down Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: polina
          POSTGRES_PASSWORD: polina
          POSTGRES_DB: polina
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U polina"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: postgres://polina:polina@localhost:5432/polina?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Install golang-migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.19.1

      - name: Migrate up
        run: migrate -path db/migrations -database "$DB_URL" up

      - name: Migrate down (verify reversibility)
        run: migrate -path db/migrations -database "$DB_URL" down -all

  swagger:
    name: Swagger Docs Drift
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@v1.16.4

      - name: Regenerate OpenAPI docs
        run: swag init -g cmd/server/main.go -o docs --parseInternal --parseDependency --parseDepth 2

      - name: Check for drift
        run: git diff --exit-code docs/
