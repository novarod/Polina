version: 2
updates:
  # Forçar atualização de Go: alterado limite e removido o group temporariamente
  - package-ecosystem: gomod
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(deps-dev)
      include: scope
    groups:
      go-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # Forçar atualização de Docker: comentário inserido para mudar o hash do ficheiro
  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    labels:
      - dependencies
      - automated
      - "area: infra"
    commit-message:
      prefix: chore(docker)
      include: scope

  # Forçar atualização de GitHub Actions: comentário inserido para reavivar a execução
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    labels:
      - dependencies
      - automated
      - "area: infra"
    commit-message:
      prefix: ci(deps)
      include: scope
