version: "2"

linters:
  enable:
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: internal/server/server\.go
        text: "SA1019"
        linters:
          - staticcheck
      - path: internal/adapters/http/handler/auth\.go
        text: "G124"
        linters:
          - gosec
      - path: internal/adapters/http/middleware/auth\.go
        text: "G124"
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
