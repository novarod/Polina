paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_novarod_polina_apps_api_internal_application_auth.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_adapters_http_handler.loginResponse'
        "401":
          description: invalid credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: not a member of the organization
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Log in
      tags:
      - auth
  /auth/logout:
    post:
      responses:
        "204":
          description: no content
      summary: Log out
      tags:
      - auth
  /auth/logout-all:
    post:
      responses:
        "204":
          description: no content
        "401":
          description: missing or invalid session
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Log out everywhere (revoke all sessions)
      tags:
      - auth
  /auth/me:
    get:
