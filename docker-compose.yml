services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: polina
      POSTGRES_USER: polina
      POSTGRES_PASSWORD: polina
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polina"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
