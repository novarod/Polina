services:
  api:
    build:
      context: apps/api
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "migrate -path db/migrations -database \"$$DATABASE_URL\" up && air -c .air.toml"
    environment:
      DATABASE_URL: postgres://polina:polina@postgres:5432/polina?sslmode=disable
      JWT_SECRET: dev-secret-change-me-please
      PORT: "8080"
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - ./apps/api:/app
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: polina
      POSTGRES_USER: polina
      POSTGRES_PASSWORD: polina
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polina"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
