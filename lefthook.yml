pre-commit:
  parallel: true
  commands:
    gofmt:
      root: apps/api/
      glob: "*.go"
      run: |
        unformatted="$(gofmt -l {staged_files})"
        if [ -n "$unformatted" ]; then
          echo "These files are not gofmt-ed:"; echo "$unformatted"
          echo "Run: gofmt -w ."
          exit 1
        fi
    vet:
      root: apps/api/
      glob: "*.go"
      run: go vet ./...
    golangci-lint:
      root: apps/api/
      glob: "*.go"
      run: golangci-lint run

commit-msg:
  commands:
    conventional-commits:
      run: |
        msg="$(head -n1 "{1}")"
        # Allow machine-generated merge/revert/fixup subjects through.
        case "$msg" in
          "Merge "*|"Revert "*|"fixup! "*|"squash! "*) exit 0 ;;
        esac
        if ! printf '%s' "$msg" | grep -qE '^(feat|fix|chore|docs|refactor|test|ci|build|perf|style|revert)(\([^)]+\))?!?: .+'; then
          echo "✗ Commit message must follow Conventional Commits."
          echo "  e.g.  feat(api): add organization module"
          echo "  type ∈ feat|fix|chore|docs|refactor|test|ci|build|perf|style|revert"
          exit 1
        fi
